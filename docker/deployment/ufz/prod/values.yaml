sms:

  sms-backend:
    enabled: true

    imagePullSecrets:
      - name: custom-rdm-sms.docker-registry

    ingress:
      enabled: true
      className: "haproxy"
      annotations:
        cert-manager.io/cluster-issuer: "cert-manager-acme"
        cert-manager.io/private-key-algorithm: "ECDSA"
        cert-manager.io/private-key-size: "384"
        cert-manager.io/private-key-rotation-policy: "Always"
        haproxy-ingress.github.io/config-backend: |
          http-response set-header 'X-Content-Type-Options' 'nosniff';
          http-response set-header 'Content-Security-Policy' "default-src 'self'; script-src 'self' 'unsafe-inline'; img-src * data: ; style-src 'self' 'unsafe-inline' * ; font-src 'self' *; frame-src 'self' *.ufz.de ; child-src 'self' *.ufz.de ; object-src 'none' ; frame-ancestors 'self' https://*.ufz.de ;connect-src https://*.ufz.de ;";

      hosts:
        - host: "web.app.ufz.de"
          paths:
            - path: /sms/backend
              pathType: Prefix
      tls:
        - secretName: "web-app-ufz-de"
          hosts:
            - "web.app.ufz.de"

    nginx:
      image:
        tag: "ufz-backend-1.26.0"
        securityContext: {}

    backend:
      image:
        tag: "ufz-prod-1.26.0"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: [ "ALL" ]
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
      environmentVariables:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-backend
              key: DATABASE_URL_ADM
        - name: OIDC_CLIENT_ID
          value: ufz-sms
        - name: MINIO_ACCESS_KEY
          value: 'AKIARSTR9Q8148V3Q0RCH'
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-backend
              key: MINIO_SECRET_KEY
        - name: MINIO_ENDPOINT
          value: 'vip.s3.ufz.de'
        - name: MINIO_BUCKET_NAME
          value: 'sms-prod'
        - name: DOWNLOAD_ENDPOINT
          value: 'https://vip.s3.ufz.de'      
        - name: ELASTICSEARCH_URL
          value: "http://custom-rdm-sms-prod-elasticsearch.custom-rdm-sms.svc.cluster.local:9200/"
        - name: HTTP_ORIGINS
          value: 'https://web.app.ufz.de'
        - name: CV_URL
          value: 'https://sms-cv.helmholtz.cloud/sms/cv/api/v1'
        - name: SMS_FRONTEND_URL
          value: 'https://web.app.ufz.de/sms'
        - name: SMS_BACKEND_URL
          value: 'https://web.app.ufz.de/sms/backend/api/v1'
        - name: B2INST_COMMUNITY
          value: 'DataHub-Helmholtz-RF-EE'
        - name: B2INST_URL
          value: 'https://b2inst.gwdg.de'
        - name: B2INST_TOKEN
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-backend
              key: B2INST_TOKEN
        - name: PID_SERVICE_USER
          value: "300%3A20.500.14372/SMS"
        - name: PID_SERVICE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-backend
              key: PID_SERVICE_PASSWORD

  elasticsearch:
    global:
      security:
        allowInsecureImages: true
    local:
      enabled: true
    master:
      masterOnly: false
      replicaCount: 1
      resourcesPreset: none
      persistence:
        enabled: true
        storageClass: "tanzu-storage-policy-raid5-ftt1"
        #        existingClaim: ""
        #        existingVolume: ""
        size: 8Gi
    data:
      replicaCount: 0
    coordinating:
      replicaCount: 0
    ingest:
      replicaCount: 0

  sms-frontend:
    enabled: true
    image:
      repository: "registry.hzdr.de/hub-terra/sms/orchestration/generic-frontend"
      tag: "1.26.0"

    imagePullSecrets:
      - name: custom-rdm-sms.docker-registry

    ingress:
      enabled: true
      className: "haproxy"
      annotations:
        cert-manager.io/cluster-issuer: "cert-manager-acme"
        cert-manager.io/private-key-algorithm: "ECDSA"
        cert-manager.io/private-key-size: "384"
        cert-manager.io/private-key-rotation-policy: "Always"
        haproxy-ingress.github.io/config-backend: |
          http-response set-header 'X-Content-Type-Options' 'nosniff';
          http-response set-header 'Content-Security-Policy' "default-src 'self' https://*.ufz.de https://login.helmholtz.de https://sms-cv.helmholtz.cloud; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.ufz.de; img-src 'self' blob: data: https://*.osm.org ; style-src 'self' 'unsafe-inline' * ; font-src 'self' *; frame-src 'self' *.ufz.de ; child-src 'self' *.ufz.de ; object-src 'none' ; frame-ancestors 'self' http://*.ufz.de https://*.ufz.de ;";

      hosts:
        - host: "web.app.ufz.de"
          paths:
            - path: /sms
              pathType: Prefix
      tls:
        - secretName: web-app-ufz-de
          hosts:
            - "web.app.ufz.de"

    environmentVariables:
      - name: BASE_URL_ENV_PLACEHOLDER
        value: /sms
      - name: SMS_BACKEND_URL_ENV_PLACEHOLDER
        value: https://web.app.ufz.de/sms/backend/api/v1
      - name: CV_BACKEND_URL_ENV_PLACEHOLDER
        value: https://sms-cv.helmholtz.cloud/sms/cv/api/v1
      - name: IDL_SYNC_URL_ENV_PLACEHOLDER
        value: https://web.app.ufz.de/sms-idl/api/hifis/sync-groups
      - name: NUXT_ENV_CLIENT_ID_ENV_PLACEHOLDER
        value: ufz-sms
      - name: NUXT_ENV_OIDC_WELL_KNOWN_ENV_PLACEHOLDER
        value: https://login.helmholtz.de/oauth2/.well-known/openid-configuration
      - name: NUXT_ENV_ALLOWED_MIMETYPES_ENV_PLACEHOLDER
        value: >-
          application/x-abiword,application/x-freearc,application/vnd.amazon.ebook,image/bmp,application/x-bzip,application/x-bzip2,text/csv,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/epub+zip,application/gzip,image/gif,text/html,image/vnd.microsoft.icon,text/calendar,image/jpeg,application/json,application/ld+json,application/vnd.oasis.opendocument.presentation,application/vnd.oasis.opendocument.spreadsheet,application/vnd.oasis.opendocument.text,image/png,application/pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/vnd.rar,application/rtf,image/svg+xml,application/x-tar,image/tiff,image/tiff,text/plain,image/webp,application/xhtml+xml,application/vnd.ms-excel,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/xml,application/vnd.mozilla.xul+xml,application/zip,application/x-7z-compressed
      - name: NUXT_ENV_SCOPE_ENV_PLACEHOLDER
        value: openid profile eduperson_principal_name email offline_access
      - name: NUXT_ENV_OIDC_REFRESH_TOKEN_ENV_PLACEHOLDER
        value: refresh_token
      - name: NUXT_ENV_OIDC_REFRESH_EXPIRE_ENV_PLACEHOLDER
        value: '28800'
      - name: NUXT_ENV_OIDC_RESPONSE_TYPE_ENV_PLACEHOLDER
        value: code
      - name: NUXT_ENV_OIDC_GRANT_TYPE_ENV_PLACEHOLDER
        value: authorization_code
      - name: NUXT_ENV_OIDC_CHALLANGE_ENV_PLACEHOLDER
        value: S256
      - name: NUXT_ENV_OIDC_REFRESH_INTERVAL_TIME_ENV_PLACEHOLDER
        value: '1800000'
      - name: NUXT_ENV_PID_BASE_URL_ENV_PLACEHOLDER
        value: https://hdl.handle.net
      - name: INSTITUTE_ENV_PLACEHOLDER
        value: ufz
      - name: NUXT_ENV_MATOMO_URL_ENV_PLACEHOLDER
        value: https://www.ufz.de/stats/
      - name: NUXT_ENV_MATOMO_TRACKER_URL_ENV_PLACEHOLDER
        value: https://www.ufz.de/stats/piwik.php
      - name: NUXT_ENV_MATOMO_SCRIPT_URL_ENV_PLACEHOLDER
        value: https://www.ufz.de/stats/piwik.js
      - name: NUXT_ENV_MATOMO_SITE_ID_ENV_PLACEHOLDER
        value: '53'
      - name: SMS_FRONTEND_URL_ENV_PLACEHOLDER
        value: https://web.app.ufz.de/sms/
      - name: SHOW_RELEASE_NOTES_ENV_PLACEHOLDER
        value: 'true'
      - name: NUXT_ENV_MAINTENANCE_DOCUMENT_URL_PLACEHOLDER
        value: "https://codebase.helmholtz.cloud/hub-terra/sms/service-desk/-/raw/maintenance-messages/sms-ufz-prod.md"
    nginxConfig: |
      server {
        listen       80;
        listen  [::]:80;
        server_name  localhost;
        root /usr/share/nginx/html/;

        location /sms {
            alias /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
      }

  sms-idl:
    enabled: false
    image:
      repository: "registry.hzdr.de/hub-terra/sms/gfz-idl/backend"
      tag: "0.6.0"

  sms-cv:
    enabled: true
    cv:
      enabled: true
      image:
        registry: "registry.hzdr.de"
        image: "hub-terra/sms/sms-cv"
        tag: "1.3.4"
      environmentVariables:
        - name: "DEBUG"
          value: "false"
        - name: CV_BASE_URL
          value: "sms/cv/"
        - name: CORS_ALLOW_ALL_ORIGINS
          value: "true"
        - name: CSRF_TRUSTED_ORIGINS
          value: "https://sms-cv.helmholtz.cloud"
        - name: STATIC_URL
          value: 'sms/cv/static/'
        - name: SQL_HOST
          value: 'postgres.intranet.ufz.de'
        - name: SQL_DATABASE
          value: 'sms_cv_prod'
        - name: SQL_USER
          value: 'sms_cv_prod_adm'
        - name: SQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-cv
              key: SQL_PASSWORD
        - name: CV_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-cv
              key: SECRET_KEY
        - name: GITLAB_TOKEN
          valueFrom:
            secretKeyRef:
              name: custom-rdm-sms-cv
              key: GITLAB_TOKEN
    cvbackup:
      enabled: false

    imagePullSecrets:
      - name: custom-rdm-sms.docker-registry

    ingress:
      enabled: true
      className: "haproxy"
      annotations:
        kubernetes.io/ingress.class: 'haproxy'
        cert-manager.io/issuer: "letsencrypt-production"
        cert-manager.io/private-key-algorithm: "ECDSA"
        cert-manager.io/private-key-size: "384"
        cert-manager.io/private-key-rotation-policy: "Always"
        haproxy-ingress.github.io/app-root: /sms/cv
        haproxy-ingress.github.io/config-backend: |
          http-response set-header 'X-Content-Type-Options' 'nosniff';
          http-response set-header 'Content-Security-Policy' "default-src 'self'; script-src 'self' 'unsafe-inline'; img-src * data: ; style-src 'self' 'unsafe-inline' * ; font-src 'self' *; frame-src 'self' *.ufz.de ; child-src 'self' *.ufz.de ; object-src 'none' ; frame-ancestors 'self' http://*.ufz.de https://*.ufz.de ;connect-src https://*.ufz.de ;";

      hosts:
        - host: "sms-cv.helmholtz.cloud"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: "sms-cv-helmholtz-cloud-tls"
          hosts:
            - "sms-cv.helmholtz.cloud"

# dont deploy local backend DBs (central Postgres is used)

  sms-cv-db:
    enabled: false

  sms-backend-db:
    enabled: false

  sms-idl-db:
    enabled: false
